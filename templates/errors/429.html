{% load static %}
<!DOCTYPE html>
<html lang="es"
      x-data="{
          darkMode: localStorage.getItem('darkMode') === 'true'
                    || (localStorage.getItem('darkMode') === null
                        && window.matchMedia('(prefers-color-scheme: dark)').matches)
      }"
      :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demasiados intentos - Ingenium Code FDM</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <script>
        (function () {
            const stored = localStorage.getItem('darkMode');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = stored === 'true' || (stored === null && prefersDark);
            if (isDark) document.documentElement.classList.add('dark');
        })();
    </script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900
             flex items-center justify-center px-6">
    <div class="max-w-md w-full text-center">

        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full
                    bg-fdm-red/10 dark:bg-fdm-red/20 mb-6">
            <svg class="w-10 h-10 text-fdm-red" fill="none" stroke="currentColor"
                 viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-3">
            Demasiados intentos
        </h1>

        <p class="text-slate-600 dark:text-slate-400 mb-6">
            Has superado el límite de solicitudes permitidas.
            Por favor espera unos minutos antes de volver a intentarlo.
        </p>

        <a href="{% url 'login' %}"
           class="inline-block px-6 py-2.5 rounded-lg
                  bg-fdm-blue hover:bg-fdm-blue-dark
                  text-white font-semibold transition-colors">
            Volver al inicio
        </a>

        <p class="mt-8 text-xs text-slate-500 dark:text-slate-500">
            Si crees que esto es un error, contacta a la administración.
        </p>
    </div>
</body>
</html>
